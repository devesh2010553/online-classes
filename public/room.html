<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1"/>
  <meta name="theme-color" content="#0C0F1A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <title>EduStream — Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="page-room">

  <!-- ══ HEADER ══════════════════════════════════════════════ -->
  <header id="hdr" class="hdr">
    <div class="hdr-l">
      <svg class="hdr-logo" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#2563EB"/>
        <polygon points="12,9 12,23 24,16" fill="white"/>
      </svg>
      <div class="hdr-meta">
        <span class="hdr-brand">EduStream</span>
        <div class="hdr-row2">
          <span id="hRoomCode" class="room-pill"></span>
          <span class="live-pill"><span class="live-dot"></span>LIVE</span>
          <span id="hTimer" class="h-timer">00:00</span>
          <span class="h-sep">·</span>
          <span id="hCount" class="h-count">
            <svg viewBox="0 0 14 14" fill="none"><circle cx="5" cy="4.5" r="1.8" stroke="currentColor" stroke-width="1.2"/><path d="M1 12c0-2 1.8-3.5 4-3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="10" cy="7" r="1.8" stroke="currentColor" stroke-width="1.2"/><path d="M7.5 12c0-1.4 1.1-2.5 2.5-2.5s2.5 1.1 2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <span id="pCount">1</span>
          </span>
        </div>
      </div>
    </div>
    <div class="hdr-r">
      <span id="qualBadge" class="qual-badge">HD</span>
    </div>
  </header>

  <!-- ══ STAGE ═══════════════════════════════════════════════ -->
  <main id="stage" class="stage">

    <!-- Video grid — JS manages layout class + tile order -->
    <div id="grid" class="grid"></div>

    <!-- Chat panel (slides in over video on mobile) -->
    <aside id="chatPanel" class="chat-panel">
      <div class="cp-head">
        <span>Class Chat</span>
        <button id="btnCloseChat" class="icon-btn">
          <svg viewBox="0 0 18 18" fill="none"><path d="M14 4 4 14M4 4l10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="chatLog" class="chat-log"></div>
      <div class="chat-composer">
        <input id="chatInput" type="text" placeholder="Message…" maxlength="500" autocomplete="off" enterkeyhint="send"/>
        <button id="btnSend" class="send-btn">
          <svg viewBox="0 0 18 18" fill="none"><path d="M16 2 9 16l-2-5.5L2 9l14-7Z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </aside>

  </main>

  <!-- ══ CONTROLS ════════════════════════════════════════════ -->
  <nav id="ctrlBar" class="ctrl-bar">

    <button id="btnMic"   class="cb active" data-tip="Mute">
      <span class="cb-ico">
        <svg class="i-on"  viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="13" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M9 22h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <svg class="i-off" viewBox="0 0 24 24" fill="none"><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 9v4a3 3 0 0 0 5.1 2.1M15 9.4V5a3 3 0 0 0-5.9-.7M17 10a5 5 0 0 1-8.9 3.1M12 19v3M9 22h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </span>
      <span class="cb-lbl">Mute</span>
    </button>

    <button id="btnCam"  class="cb active" data-tip="Cam Off">
      <span class="cb-ico">
        <svg class="i-on"  viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="m16 11 6-4v10l-6-4" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <svg class="i-off" viewBox="0 0 24 24" fill="none"><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M7 7H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12c.5 0 1-.2 1.4-.5M16 11l6-4v10l-5.6-3.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="cb-lbl">Camera</span>
    </button>

    <button id="btnShare" class="cb" data-tip="Stop Share">
      <span class="cb-ico">
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 12 12 8l3 4M12 8v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </span>
      <span class="cb-lbl">Share</span>
    </button>

    <button id="btnHand" class="cb" data-tip="Lower">
      <span class="cb-ico"><span class="hand-em">✋</span></span>
      <span class="cb-lbl">Hand</span>
    </button>

    <button id="btnChat" class="cb" data-tip="Chat">
      <span class="cb-ico" style="position:relative">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <span id="unread" class="unread hidden">0</span>
      </span>
      <span class="cb-lbl">Chat</span>
    </button>

    <button id="btnLeave" class="cb danger" data-tip="Leave">
      <span class="cb-ico">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="cb-lbl">Leave</span>
    </button>

  </nav>

  <!-- ══ TOASTS ═══════════════════════════════════════════════ -->
  <div id="toasts" class="toasts"></div>

  <!-- ══ LEAVE MODAL ══════════════════════════════════════════ -->
  <div id="leaveModal" class="modal-bg hidden">
    <div class="modal-box">
      <h3>Leave class?</h3>
      <p>You will be disconnected from this live session.</p>
      <div class="modal-btns">
        <button id="btnStay" class="mbtn-stay">Stay</button>
        <button id="btnGo"   class="mbtn-go">Leave</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/room.js"></script>
</body>
</html>
