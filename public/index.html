<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0D14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="EduStream"/>
  <title>EduStream — 4K Live Classes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="join-page">
  <canvas id="bgCanvas" class="bg-canvas"></canvas>

  <div class="join-shell">
    <div class="join-brand">
      <div class="join-logo">
        <svg viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="url(#lg1)"/>
          <defs><linearGradient id="lg1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#6366F1"/>
          </linearGradient></defs>
          <path d="M11 27V15l9 5.5 9-5.5V27" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="13.5" r="3.5" fill="white"/>
        </svg>
      </div>
      <div>
        <div class="join-brand-name">EduStream</div>
        <div class="join-brand-tag">Real-time 4K Classroom</div>
      </div>
    </div>

    <div class="join-card">
      <div class="join-card-glow"></div>
      <div class="join-form-side">
        <h1 class="join-heading">Join your <span class="accent-text">class</span></h1>
        <p class="join-sub">Connect instantly — no account, no downloads</p>

        <div class="field">
          <label for="name">Your Name</label>
          <div class="field-input-wrap">
            <svg class="field-icon" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="name" type="text" placeholder="e.g. Aarav Sharma" autocomplete="name" spellcheck="false"/>
          </div>
        </div>

        <div class="field">
          <label for="roomId">Class Code</label>
          <div class="field-input-wrap">
            <svg class="field-icon" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 8V6a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="roomId" type="text" placeholder="e.g. MATH-2025" autocomplete="off" spellcheck="false" style="text-transform:uppercase"/>
          </div>
        </div>

        <div id="errBox" class="err-box" style="display:none"></div>

        <button id="joinBtn" class="join-btn" type="button">
          <span class="join-btn-text">Enter Class</span>
          <svg class="join-btn-arrow" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="join-btn-spinner" style="display:none"><span class="spin"></span></span>
        </button>

        <div class="join-chips">
          <span class="chip">🔒 Encrypted</span>
          <span class="chip">📹 4K Quality</span>
          <span class="chip">📱 Mobile Ready</span>
          <span class="chip">⚡ Real-time</span>
        </div>
      </div>

      <div class="join-visual-side">
        <div class="jv-grid"></div>
        <div class="jv-floating fc1">
          <div class="jv-dot green"></div>
          <span>Live • 4K Stream</span>
        </div>
        <div class="jv-floating fc2">
          <div class="jv-dot blue"></div>
          <span>Screen Share</span>
        </div>
        <div class="jv-floating fc3">
          <div class="jv-dot amber"></div>
          <span>AI Speaker Detect</span>
        </div>
        <div class="jv-floating fc4">
          <div class="jv-dot purple"></div>
          <span>Pin Participants</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
